<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 600px;
            text-align: center;
        }
        h1 { color: #00d4ff; margin-bottom: 1rem; font-size: 2.5rem; }
        p { font-size: 1.2rem; margin-bottom: 2rem; line-height: 1.6; }
        .items { 
            list-style: none; 
            text-align: left;
        }
        .items li {
            padding: 1rem;
            margin: 0.5rem 0;
            background: rgba(0,212,255,0.1);
            border-radius: 10px;
            border-left: 4px solid #00d4ff;
            transition: transform 0.3s;
        }
        .items li:hover { transform: translateX(10px); }
        .badge {
            display: inline-block;
            background: #00d4ff;
            color: #1a1a2e;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{.Title}}</h1>
        <p>{{.Message}}</p>
        <ul class="items">
            {{range .Items}}
            <li>{{.}}</li>
            {{end}}
        </ul>
        <span class="badge">Go Templates FTW! 🚀</span>
    </div>
</body>
</html>
